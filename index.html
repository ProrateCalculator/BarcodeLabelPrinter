<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Barcode Label Printer</title>


<style>
:root {
--label-width: 2.25in;
--label-height: 1.25in;
--barcode-height: 28;
}

* {
box-sizing: border-box;
}

body {
font-family: Arial, sans-serif;
margin: 20px;
background: #f5f7fb;
color: #1f2937;
}

h1 {
margin-bottom: 8px;
}

.panel {
background: #fff;
border: 1px solid #d1d5db;
border-radius: 10px;
padding: 15px;
max-width: 950px;
margin-bottom: 15px;
}

.grid {
display: grid;
grid-template-columns: repeat(3, minmax(170px, 1fr));
gap: 12px;
}

label {
display: block;
font-weight: bold;
margin-top: 10px;
margin-bottom: 5px;
}

input,
select {
padding: 8px;
width: 100%;
border: 1px solid #9ca3af;
border-radius: 6px;
background: white;
}

button {
margin-top: 12px;
padding: 10px 16px;
background: #2563eb;
color: #fff;
border: none;
border-radius: 7px;
font-weight: bold;
cursor: pointer;
}

button:hover {
background: #1d4ed8;
}

.secondary {
background: #4b5563;
}

.secondary:hover {
background: #374151;
}

.status {
margin-top: 10px;
font-weight: bold;
}

#labels,
#individualPreviewBody {
display: flex;
flex-wrap: wrap;
gap: 0.10in;
align-items: flex-start;
}

.preview-label-item {
display: flex;
flex-direction: column;
align-items: center;
gap: 6px;
}

.remove-label-btn {
margin-top: 0;
padding: 6px 10px;
background: #dc2626;
font-size: 12px;
}

.remove-label-btn:hover {
background: #b91c1c;
}

.label {
width: var(--label-width);
height: var(--label-height);
background: #fff;
border: 2px dotted #000 !important;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
break-inside: avoid;
page-break-inside: avoid;
padding: 0.05in;
overflow: hidden;
text-align: center;
}

.name {
font-weight: bold;
font-size: 11px;
line-height: 1.05;
white-space: nowrap;
max-width: 100%;
overflow: hidden;
text-overflow: ellipsis;
}

.logo {
max-width: 0.95in;
max-height: 0.30in;
margin: 2px 0;
object-fit: contain;
}

.barcode-text {
font-size: 9px;
line-height: 1;
white-space: nowrap;
max-width: 100%;
overflow: hidden;
text-overflow: ellipsis;
}

svg {
max-width: 100%;
}

table {
width: 100%;
border-collapse: collapse;
margin-top: 12px;
background: white;
}

th,
td {
border: 1px solid #d1d5db;
padding: 7px;
text-align: left;
font-size: 14px;
}

th {
background: #e5e7eb;
}

.hidden {
display: none;
}

@page {
margin: 0.25in;
}

@media (max-width: 750px) {
.grid {
grid-template-columns: 1fr;
}
}

@media print {
* {
-webkit-print-color-adjust: exact !important;
print-color-adjust: exact !important;
}

body {
margin: 0;
background: white;
}

.no-print {
display: none !important;
}

.label {
border: 2px dotted #000 !important;
}
}
</style>
</head>

<body>
<div class="no-print">
<h1>Barcode Label Printer</h1>

<div class="panel">
<h2>Individual Barcode</h2>

<div class="grid">
<div>
<label for="fn">First Name</label>
<input id="fn" type="text">
</div>
<div>
<label for="ln">Last Name</label>
<input id="ln" type="text">
</div>
<div>
<label for="bc">Barcode</label>
<input id="bc" type="text">
</div>
</div>

<div class="grid">
<div>
<label for="singleLogo">Logo</label>
<select id="singleLogo">
<option value="none">No Logo</option>
<option value="ymca">YMCA</option>
<option value="bgc">Boys & Girls Club</option>
<option value="jcc">JCC</option>
<option value="ywca">YWCA</option>
</select>
</div>

<div>
<label for="singleSize">Printable Barcode Size</label>
<select id="singleSize">
<option value="2.25x1.25">2.25" x 1.25"</option>
<option value="3x2">3" x 2"</option>
</select>
</div>
</div>

<button onclick="createOne()">Create Individual Label</button>
    <button onclick="printIndividual()">Print Individual Labels</button>
    <button class="secondary" onclick="clearIndividualLabels()">Clear Individual Labels</button>
    <div id="individualStatus" class="status"></div>

    <div id="individualPreviewPanel" class="panel hidden">
      <h2>Individual Preview</h2>
      <p>Each label you create will be added here so they can be printed together.</p>
      <div id="individualPreviewBody"></div>
    </div>
</div>

<div class="panel">
<h2>CSV or XLSX Upload</h2>
<p>
File columns should be:<br><br>
<strong>Column 1 = First Name</strong><br>
<strong>Column 2 = Last Name</strong><br>
<strong>Column 3 = Barcode</strong>
</p>

<label for="fileUpload">Upload CSV or XLSX File</label>
<input type="file" id="fileUpload" accept=".csv,.xlsx,.xls,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel">

<div class="grid">
<div>
<label for="csvLogo">Logo</label>
<select id="csvLogo">
<option value="none">No Logo</option>
<option value="ymca">YMCA</option>
<option value="bgc">Boys & Girls Club</option>
<option value="jcc">JCC</option>
<option value="ywca">YWCA</option>
</select>
</div>

<div>
<label for="csvSize">Printable Barcode Size</label>
<select id="csvSize">
<option value="2.25x1.25">2.25" x 1.25"</option>
<option value="3x2">3" x 2"</option>
</select>
</div>
</div>

<button onclick="applyCsvSettingsAndRender()">Generate Labels from Uploaded File</button>
<button onclick="printLabels()">Print Uploaded Labels</button>
<button class="secondary" onclick="clearLabels()">Clear</button>

<div id="status" class="status"></div>
</div>

</div>

<div id="labels"></div>

<script>

/* Self-contained barcode + XLSX support: no CDN required. */
const CODE128_PATTERNS = [
"212222","222122","222221","121223","121322","131222","122213","122312","132212","221213",
"221312","231212","112232","122132","122231","113222","123122","123221","223211","221132",
"221231","213212","223112","312131","311222","321122","321221","312212","322112","322211",
"212123","212321","232121","111323","131123","131321","112313","132113","132311","211313",
"231113","231311","112133","112331","132131","113123","113321","133121","313121","211331",
"231131","213113","213311","213131","311123","311321","331121","312113","312311","332111",
"314111","221411","431111","111224","111422","121124","121421","141122","141221","112214",
"112412","122114","122411","142112","142211","241211","221114","413111","241112","134111",
"111242","121142","121241","114212","124112","124211","411212","421112","421211","212141",
"214121","412121","111143","111341","131141","114113","114311","411113","411311","113141",
"114131","311141","411131","211412","211214","211232","2331112"
];

function drawCode128Svg(svg, value, height = 28, moduleWidth = 1.2) {
  if (!svg) return;
  const text = String(value || "");
  if (!text) throw new Error("Empty barcode");
  for (const ch of text) {
    const code = ch.charCodeAt(0);
    if (code < 32 || code > 126) throw new Error("Unsupported CODE128 character");
  }
  const codes = [104]; // Start Code B
  for (const ch of text) codes.push(ch.charCodeAt(0) - 32);
  let checksum = 104;
  for (let i = 1; i < codes.length; i++) checksum += codes[i] * i;
  codes.push(checksum % 103, 106);

  const quiet = 10;
  let x = quiet;
  let bars = "";
  for (const code of codes) {
    const pattern = CODE128_PATTERNS[code];
    for (let i = 0; i < pattern.length; i++) {
      const width = Number(pattern[i]) * moduleWidth;
      if (i % 2 === 0) {
        bars += `<rect x="${x.toFixed(2)}" y="0" width="${width.toFixed(2)}" height="${height}"></rect>`;
      }
      x += width;
    }
  }
  x += quiet;
  svg.setAttribute("viewBox", `0 0 ${x.toFixed(2)} ${height}`);
  svg.setAttribute("width", x.toFixed(2));
  svg.setAttribute("height", height);
  svg.setAttribute("role", "img");
  svg.innerHTML = bars;
}

function readUInt16LE(bytes, offset) { return bytes[offset] | (bytes[offset + 1] << 8); }
function readUInt32LE(bytes, offset) { return (bytes[offset] | (bytes[offset + 1] << 8) | (bytes[offset + 2] << 16) | (bytes[offset + 3] << 24)) >>> 0; }
function decodeUTF8(bytes) { return new TextDecoder("utf-8").decode(bytes); }

async function inflateDeflateRaw(bytes) {
  if (typeof DecompressionStream === "undefined") throw new Error("This browser cannot decompress XLSX files offline.");
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}

async function unzipXLSX(bytes) {
  let eocd = -1;
  for (let i = bytes.length - 22; i >= 0; i--) {
    if (readUInt32LE(bytes, i) === 0x06054b50) { eocd = i; break; }
  }
  if (eocd < 0) throw new Error("Invalid XLSX zip file");
  const totalEntries = readUInt16LE(bytes, eocd + 10);
  const centralOffset = readUInt32LE(bytes, eocd + 16);
  const files = {};
  let ptr = centralOffset;
  for (let i = 0; i < totalEntries; i++) {
    if (readUInt32LE(bytes, ptr) !== 0x02014b50) break;
    const method = readUInt16LE(bytes, ptr + 10);
    const compressedSize = readUInt32LE(bytes, ptr + 20);
    const nameLength = readUInt16LE(bytes, ptr + 28);
    const extraLength = readUInt16LE(bytes, ptr + 30);
    const commentLength = readUInt16LE(bytes, ptr + 32);
    const localOffset = readUInt32LE(bytes, ptr + 42);
    const name = decodeUTF8(bytes.slice(ptr + 46, ptr + 46 + nameLength));

    const localNameLength = readUInt16LE(bytes, localOffset + 26);
    const localExtraLength = readUInt16LE(bytes, localOffset + 28);
    const dataStart = localOffset + 30 + localNameLength + localExtraLength;
    const compressed = bytes.slice(dataStart, dataStart + compressedSize);
    let data;
    if (method === 0) data = compressed;
    else if (method === 8) data = await inflateDeflateRaw(compressed);
    else throw new Error("Unsupported XLSX compression method");
    files[name] = decodeUTF8(data);
    ptr += 46 + nameLength + extraLength + commentLength;
  }
  return files;
}

function columnIndex(cellRef) {
  const letters = String(cellRef || "").match(/[A-Z]+/i);
  if (!letters) return 0;
  let n = 0;
  for (const ch of letters[0].toUpperCase()) n = n * 26 + (ch.charCodeAt(0) - 64);
  return n - 1;
}

function xmlTextContent(node) { return node ? node.textContent || "" : ""; }

async function parseXLSX(bytes) {
  const files = await unzipXLSX(bytes);
  const parser = new DOMParser();
  const shared = [];
  if (files["xl/sharedStrings.xml"]) {
    const doc = parser.parseFromString(files["xl/sharedStrings.xml"], "application/xml");
    doc.querySelectorAll("si").forEach(si => {
      const parts = [];
      si.querySelectorAll("t").forEach(t => parts.push(t.textContent || ""));
      shared.push(parts.join(""));
    });
  }

  let sheetPath = "xl/worksheets/sheet1.xml";
  if (!files[sheetPath]) {
    const found = Object.keys(files).find(name => /^xl\/worksheets\/sheet\d+\.xml$/.test(name));
    if (found) sheetPath = found;
  }
  if (!files[sheetPath]) throw new Error("No worksheet found");

  const sheetDoc = parser.parseFromString(files[sheetPath], "application/xml");
  const rows = [];
  sheetDoc.querySelectorAll("sheetData row").forEach(rowNode => {
    const row = [];
    rowNode.querySelectorAll("c").forEach(cell => {
      const col = columnIndex(cell.getAttribute("r"));
      const type = cell.getAttribute("t");
      let value = "";
      if (type === "s") value = shared[Number(xmlTextContent(cell.querySelector("v")))] || "";
      else if (type === "inlineStr") value = xmlTextContent(cell.querySelector("is t"));
      else value = xmlTextContent(cell.querySelector("v"));
      row[col] = value;
    });
    rows.push(row.map(value => value == null ? "" : value));
  });
  return rows;
}

function setLabelSize(sizeValue) {
const parts = sizeValue.split("x");
document.documentElement.style.setProperty("--label-width", parts[0] + "in");
document.documentElement.style.setProperty("--label-height", parts[1] + "in");
}

function applyCsvSettingsAndRender() {
activeLogo = document.getElementById("csvLogo").value;
setLabelSize(document.getElementById("csvSize").value);

if (!uploadRows.length) {
alert("Please upload a CSV or XLSX file first.");
return;
}

activeRowsType = "upload";
render(uploadRows, "upload");
}

function handleFileUpload(event) {
const file = event.target.files[0];
if (!file) return;

const ext = file.name.split(".").pop().toLowerCase();

if (ext === "xlsx" || ext === "xls") {
const reader = new FileReader();
reader.onload = async function(e) {
try {
const data = new Uint8Array(e.target.result);
const sheetRows = await parseXLSX(data);
loadRows(sheetRows);
} catch (error) {
alert("Could not read this Excel file. Please save it as .xlsx or CSV and try again.");
console.error(error);
}
};
reader.readAsArrayBuffer(file);
} else {
const reader = new FileReader();
reader.onload = function(e) {
const parsed = parseCSV(e.target.result);
loadRows(parsed);
};
reader.readAsText(file);
}
}

function loadRows(rawRows) {
uploadRows = rawRows
.map(row => ({
f: String(row[0] || "").trim(),
l: String(row[1] || "").trim(),
b: String(row[2] || "").trim()
}))
.filter(row => row.f || row.l || row.b);

if (
uploadRows.length &&
uploadRows[0].f.toLowerCase().includes("first") &&
uploadRows[0].l.toLowerCase().includes("last") &&
uploadRows[0].b.toLowerCase().includes("barcode")
) {
uploadRows.shift();
}

document.getElementById("status").textContent = uploadRows.length
? uploadRows.length + " label(s) loaded. Choose logo/size, then click Generate Labels."
: "No valid rows found.";

  renderPreview();

if (uploadRows.length) {
applyCsvSettingsAndRender();
}
}

function createOne() {
const firstName = document.getElementById("fn").value.trim();
const lastName = document.getElementById("ln").value.trim();
const barcode = document.getElementById("bc").value.trim();

if (!barcode) {
alert("Please enter a barcode.");
return false;
}

activeLogo = document.getElementById("singleLogo").value;
setLabelSize(document.getElementById("singleSize").value);

individualRows.push({ f: firstName, l: lastName, b: barcode });

  document.getElementById("individualStatus").textContent = individualRows.length + " individual label(s) ready to print.";
  renderIndividualPreview();

return true;
}

function printIndividual() {
if (!individualRows.length) {
alert("Please create at least one individual barcode first.");
return;
}
activeLogo = document.getElementById("singleLogo").value;
setLabelSize(document.getElementById("singleSize").value);
activeRowsType = "individual";
render(individualRows, "individual");
window.print();
setTimeout(() => {
  activeLogo = document.getElementById("csvLogo").value;
  setLabelSize(document.getElementById("csvSize").value);
  activeRowsType = "upload";
  render(uploadRows, "upload");
}, 250);
}

function renderIndividualPreview() {
  const individualPreviewPanel = document.getElementById("individualPreviewPanel");
  const individualPreviewBody = document.getElementById("individualPreviewBody");
  const individualStatus = document.getElementById("individualStatus");

  individualPreviewBody.innerHTML = "";

  const previewLogo = document.getElementById("singleLogo").value;
  setLabelSize(document.getElementById("singleSize").value);

  individualRows.forEach((row, index) => {
    const previewItem = document.createElement("div");
    previewItem.className = "preview-label-item";

    const label = document.createElement("div");
    label.className = "label";

    const fullName = `${row.f} ${row.l}`.trim();
    const barcodeId = "individualPreviewBarcode-" + index;
    const logoHtml = previewLogo === "none" ? "" : `<img class="logo" src="${logos[previewLogo]}" alt="">`;

    label.innerHTML = `
      <div class="name">${escapeHTML(fullName)}</div>
      ${logoHtml}
      <svg id="${barcodeId}"></svg>
      <div class="barcode-text">${escapeHTML(row.b)}</div>
    `;

    const removeButton = document.createElement("button");
    removeButton.type = "button";
    removeButton.className = "remove-label-btn";
    removeButton.textContent = "Remove";
    removeButton.onclick = () => removeIndividualLabel(index);

    previewItem.appendChild(label);
    previewItem.appendChild(removeButton);
    individualPreviewBody.appendChild(previewItem);

    if (row.b) {
      try {
        drawCode128Svg(document.getElementById(barcodeId), row.b, activeBarcodeHeight, 1.2);
      } catch (error) {
        label.querySelector("svg").outerHTML = "<div>Invalid barcode</div>";
      }
    }
  });

  individualPreviewPanel.classList.toggle("hidden", individualRows.length === 0);
  if (individualStatus) {
    individualStatus.textContent = individualRows.length
      ? individualRows.length + " individual label(s) ready to print."
      : "";
  }
}

function removeIndividualLabel(index) {
  individualRows.splice(index, 1);
  renderIndividualPreview();
}

function removeUploadedLabel(index) {
  uploadRows.splice(index, 1);
  renderPreview();
  activeRowsType = "upload";
  render(uploadRows, "upload");

  const status = document.getElementById("status");
  if (status) {
    status.textContent = uploadRows.length
      ? uploadRows.length + " uploaded label(s) ready to print."
      : "No uploaded labels left to print.";
  }
}

function renderPreview() {
  // Upload data table intentionally removed.
}

function render(rowsToRender = uploadRows, type = activeRowsType) {
const labelContainer = document.getElementById("labels");
labelContainer.innerHTML = "";

const currentLogo = type === "individual"
  ? document.getElementById("singleLogo").value
  : document.getElementById("csvLogo").value;
setLabelSize(type === "individual"
  ? document.getElementById("singleSize").value
  : document.getElementById("csvSize").value);

rowsToRender.forEach((row, index) => {
const previewItem = document.createElement("div");
previewItem.className = "preview-label-item";

const label = document.createElement("div");
label.className = "label";

const fullName = `${row.f} ${row.l}`.trim();
const barcodeId = "barcode-" + index;
const logoHtml = currentLogo === "none" ? "" : `<img class="logo" src="${logos[currentLogo]}" alt="">`;

label.innerHTML = `
     <div class="name">${escapeHTML(fullName)}</div>
     ${logoHtml}
     <svg id="${barcodeId}"></svg>
     <div class="barcode-text">${escapeHTML(row.b)}</div>
   `;

const removeButton = document.createElement("button");
removeButton.type = "button";
removeButton.className = "remove-label-btn no-print";
removeButton.textContent = "Remove";
removeButton.onclick = () => type === "individual" ? removeIndividualLabel(index) : removeUploadedLabel(index);

previewItem.appendChild(label);
previewItem.appendChild(removeButton);
labelContainer.appendChild(previewItem);

if (row.b) {
try {
drawCode128Svg(document.getElementById(barcodeId), row.b, activeBarcodeHeight, 1.2);
} catch (error) {
label.querySelector("svg").outerHTML = "<div>Invalid barcode</div>";
}
}
});
}

function printLabels() {
if (!uploadRows.length) {
alert("Please upload a CSV/XLSX file first.");
return;
}

activeRowsType = "upload";
render(uploadRows, "upload");
window.print();
}

function clearLabels() {
uploadRows = [];
document.getElementById("fileUpload").value = "";
document.getElementById("labels").innerHTML = "";
document.getElementById("status").textContent = "";
}


function updateIndividualPreviewSettings() {
  if (individualRows.length) {
    renderIndividualPreview();
  }
}

function updateUploadPreviewSettings() {
  if (uploadRows.length) {
    activeRowsType = "upload";
    render(uploadRows, "upload");
  }
}

function parseCSV(text) {
const result = [];
let row = [];
let current = "";
let insideQuotes = false;

for (let i = 0; i < text.length; i++) {
const char = text[i];
const nextChar = text[i + 1];

if (char === '"' && insideQuotes && nextChar === '"') {
current += '"';
i++;
} else if (char === '"') {
insideQuotes = !insideQuotes;
} else if (char === "," && !insideQuotes) {
row.push(current);
current = "";
} else if ((char === "\n" || char === "\r") && !insideQuotes) {
if (char === "\r" && nextChar === "\n") i++;
row.push(current);
result.push(row);
row = [];
current = "";
} else {
current += char;
}
}

if (current || row.length) {
row.push(current);
result.push(row);
}

return result;
}

function escapeHTML(value) {
return String(value)
.replaceAll("&", "&amp;")
.replaceAll("<", "&lt;")
.replaceAll(">", "&gt;")
.replaceAll('"', "&quot;")
.replaceAll("'", "&#039;");
}

  individualRows = [];
  document.getElementById("individualPreviewBody").innerHTML = "";
  document.getElementById("individualPreviewPanel").classList.add("hidden");
  document.getElementById("individualStatus").textContent = "";
  activeLogo = document.getElementById("csvLogo").value;
  setLabelSize(document.getElementById("csvSize").value);
  activeRowsType = "upload";
  render(uploadRows, "upload");
}
